blank_issues_enabled: false
contact_links:
  - name: Security vulnerability (do not open a public issue)
    url: https://github.com/Open-H2O/openh2o/security/advisories/new
    about: Report security issues privately through GitHub's advisory form. See SECURITY.md.
  - name: A number in my deployment looks wrong
    url: https://github.com/Open-H2O/openh2o/blob/main/CONTRIBUTING.md#reporting-bugs-and-ideas
    about: That is runtime data, not a code bug — use your site's in-app "Send feedback" widget, or talk to whoever operates your deployment.
  - name: Question or "how do I…"
    url: https://github.com/Open-H2O/openh2o/discussions
    about: Ask in Discussions so the answer stays searchable for the next person.
