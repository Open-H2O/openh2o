{% comment %}
Returned when the user clicks the pencil icon on a well field.
Replaces the content of #field-<fieldname>.
{% endcomment %}
<form
  hx-patch="{% url 'wells:edit_field' well.pk %}"
  hx-target="#field-{{ field }}"
  hx-swap="innerHTML"
  style="display: flex; align-items: flex-start; gap: var(--space-xs); width: 100%;">

  <input type="hidden" name="field" value="{{ field }}">

  {% if field_meta.type == "select" %}
    <select name="value"
      style="flex: 1; padding: 4px 8px; background: var(--color-elevated); border: 1px solid var(--color-gold); border-radius: var(--radius-sm); color: var(--color-text-primary); font-size: 0.875rem; outline: none;">
      {% for choice_val, choice_label in field_meta.choices %}
        <option value="{{ choice_val }}" {% if choice_val == value|stringformat:"s" %}selected{% endif %}>{{ choice_label }}</option>
      {% endfor %}
    </select>
  {% elif field_meta.type == "textarea" %}
    <textarea name="value" rows="3"
      style="flex: 1; padding: 4px 8px; background: var(--color-elevated); border: 1px solid var(--color-gold); border-radius: var(--radius-sm); color: var(--color-text-primary); font-size: 0.875rem; outline: none; resize: vertical;">{{ value }}</textarea>
  {% elif field_meta.type == "number" %}
    <input type="number" name="value" value="{{ value }}"
      step="{{ field_meta.step|default:'1' }}"
      style="flex: 1; padding: 4px 8px; background: var(--color-elevated); border: 1px solid var(--color-gold); border-radius: var(--radius-sm); color: var(--color-text-primary); font-size: 0.875rem; outline: none;">
  {% else %}
    <input type="text" name="value" value="{{ value }}"
      style="flex: 1; padding: 4px 8px; background: var(--color-elevated); border: 1px solid var(--color-gold); border-radius: var(--radius-sm); color: var(--color-text-primary); font-size: 0.875rem; outline: none;">
  {% endif %}

  <button type="submit" class="btn-primary btn-sm">Save</button>
  <button type="button" class="btn-secondary btn-sm"
    hx-get="{% url 'wells:edit_field' well.pk %}?field={{ field }}&cancel=1"
    hx-target="#field-{{ field }}"
    hx-swap="innerHTML">Cancel</button>
</form>
