{% if status == "active" %}
  <span style="display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.25);">Active</span>
{% elif status == "inactive" %}
  <span style="display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; background: rgba(148,163,184,0.12); color: var(--color-text-secondary); border: 1px solid rgba(148,163,184,0.2);">Inactive</span>
{% elif status == "destroyed" %}
  <span style="display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.25);">Destroyed</span>
{% elif status == "proposed" %}
  <span style="display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; background: rgba(27,127,175,0.2); color: var(--color-blue); border: 1px solid rgba(27,127,175,0.35);">Proposed</span>
{% else %}
  <span style="display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; background: var(--color-elevated); color: var(--color-text-secondary); border: 1px solid var(--color-border-hover);">{{ status|capfirst }}</span>
{% endif %}
