{% extends "base.html" %}

{% block title %}Water Rights - Open Water Accounting Platform{% endblock %}
{% block page_title %}Water Rights{% endblock %}

{% block content %}
<div class="page-stack">

  <!-- Toolbar -->
  <div class="card-raised" style="display: flex; flex-wrap: wrap; gap: var(--space-md); align-items: flex-end;">
    <!-- Search -->
    <div style="flex: 1; min-width: 200px;">
      <label class="form-label">Search</label>
      <input
        type="text"
        name="q"
        value="{{ q }}"
        placeholder="Right ID or holder name..."
        hx-get="{% url 'surface:water_rights_list' %}"
        hx-target="#results"
        hx-trigger="keyup changed delay:300ms"
        hx-include="[name='status']"
        class="form-input"
      >
    </div>

    <!-- Status filter -->
    <div>
      <label class="form-label">Status</label>
      <select
        name="status"
        hx-get="{% url 'surface:water_rights_list' %}"
        hx-target="#results"
        hx-trigger="change"
        hx-include="[name='q']"
        class="form-select"
      >
        <option value="" {% if not status %}selected{% endif %}>All Statuses</option>
        {% for val, label in status_choices %}
          <option value="{{ val }}" {% if status == val %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <!-- Results -->
  <div id="results">
    {% include "surface/partials/_list_results.html" %}
  </div>

</div>
{% endblock %}
