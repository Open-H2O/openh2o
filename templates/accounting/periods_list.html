{% extends "base.html" %}

{% block title %}Reporting Periods - Open Water Accounting Platform{% endblock %}
{% block page_title %}Reporting Periods{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; gap: var(--space-lg);">

  <!-- Toolbar -->
  <div class="card-raised" style="display: flex; flex-wrap: wrap; gap: var(--space-md); align-items: flex-end;">
    <!-- Search -->
    <div style="flex: 1; min-width: 200px;">
      <label style="display: block; font-size: 0.75rem; font-weight: 600; color: var(--color-text-secondary); margin-bottom: var(--space-xs); text-transform: uppercase; letter-spacing: 0.05em;">
        Search
      </label>
      <input
        type="text"
        name="q"
        value="{{ q }}"
        placeholder="Period name..."
        hx-get="{% url 'accounting:periods_list' %}"
        hx-target="#results"
        hx-trigger="keyup changed delay:300ms"
        style="width: 100%; padding: var(--space-sm) var(--space-md); background: var(--color-elevated); border: 1px solid var(--color-border-hover); border-radius: var(--radius-sm); color: var(--color-text-primary); font-size: 0.875rem; outline: none;"
      >
    </div>

    <!-- Create button -->
    <div>
      <a href="{% url 'accounting:period_create' %}" class="btn-primary" style="text-decoration: none;">+ New Period</a>
    </div>
  </div>

  <!-- Results -->
  <div id="results">
    {% include "accounting/partials/_periods_list_results.html" %}
  </div>

</div>
{% endblock %}
