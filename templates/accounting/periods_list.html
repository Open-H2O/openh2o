{% extends "base.html" %}

{% block title %}Reporting Periods - Open Water Accounting Platform{% endblock %}
{% block page_title %}Reporting Periods{% endblock %}

{% block content %}
<div class="page-stack">

  <!-- Toolbar -->
  <div class="card-raised" style="display: flex; flex-wrap: wrap; gap: var(--space-md); align-items: flex-end;">
    <!-- Search -->
    <div style="flex: 1; min-width: 200px;">
      <label class="form-label">Search</label>
      <input
        type="text"
        name="q"
        value="{{ q }}"
        placeholder="Period name..."
        hx-get="{% url 'accounting:periods_list' %}"
        hx-target="#results"
        hx-trigger="keyup changed delay:300ms"
        class="form-input"
      >
    </div>

    <!-- Create button -->
    <div>
      <a href="{% url 'accounting:period_create' %}" class="btn-primary" style="text-decoration: none;">+ New Period</a>
    </div>
  </div>

  <!-- Results -->
  <div id="results">
    {% include "accounting/partials/_periods_list_results.html" %}
  </div>

</div>
{% endblock %}
