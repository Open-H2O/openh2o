{% if assignments %}
<table class="data-table">
  <thead>
    <tr>
      <th>Parcel</th>
      <th>Added</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for wap in assignments %}
    <tr>
      <td>
        <a href="{% url 'parcels:detail' wap.parcel.pk %}" class="data-table-link">
          {{ wap.parcel.parcel_number }}
        </a>
      </td>
      <td class="text-secondary">{{ wap.added_date|date:"M d, Y" }}</td>
      <td style="text-align: right;">
        <button
          hx-post="{% url 'accounting:remove_parcel' account.pk wap.pk %}"
          hx-target="#parcel-assignments"
          hx-confirm="Remove parcel {{ wap.parcel.parcel_number }} from this account?"
          class="btn-secondary btn-sm"
          style="font-size: 0.75rem; padding: 1px 8px; color: var(--color-error); border-color: rgba(239,68,68,0.3);">
          Remove
        </button>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="text-tertiary" style="font-size: 0.875rem;">No parcels assigned to this account.</p>
{% endif %}
