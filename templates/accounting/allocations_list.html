{% extends "base.html" %}

{% block title %}Allocation Plans - Open Water Accounting Platform{% endblock %}
{% block page_title %}Allocation Plans{% endblock %}

{% block content %}
<div class="page-stack">

  <!-- Toolbar -->
  <div class="card-raised" style="display: flex; flex-wrap: wrap; gap: var(--space-md); align-items: flex-end;">
    <!-- Search -->
    <div style="flex: 1; min-width: 200px;">
      <label class="form-label">Search</label>
      <input
        type="text"
        name="q"
        value="{{ q }}"
        placeholder="Plan name, zone, or water type..."
        hx-get="{% url 'accounting:allocations_list' %}"
        hx-target="#results"
        hx-trigger="keyup changed delay:300ms"
        hx-include="[name='period']"
        class="form-input"
      >
    </div>

    <!-- Period filter -->
    <div>
      <label class="form-label">Period</label>
      <select
        name="period"
        hx-get="{% url 'accounting:allocations_list' %}"
        hx-target="#results"
        hx-trigger="change"
        hx-include="[name='q']"
        class="form-select"
      >
        <option value="" {% if not period_id %}selected{% endif %}>All Periods</option>
        {% for p in periods %}
          <option value="{{ p.pk }}" {% if period_id == p.pk|stringformat:"d" %}selected{% endif %}>{{ p.name }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Create button -->
    <div>
      <a href="{% url 'accounting:allocation_create' %}" class="btn-primary">+ New Allocation</a>
    </div>
  </div>

  <!-- Results -->
  <div id="results">
    {% include "accounting/partials/_allocations_list_results.html" %}
  </div>

</div>
{% endblock %}
