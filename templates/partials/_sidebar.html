{% load static %}
<aside id="sidebar"
       class="sidebar"
       data-collapsed="false">
    <!-- Brand -->
    <div class="sidebar-brand">
        <span class="sidebar-brand-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                <path d="M8 12c0-2.21 1.79-4 4-4s4 1.79 4 4-1.79 4-4 4"/>
                <circle cx="12" cy="12" r="1"/>
            </svg>
        </span>
        <span class="sidebar-brand-text">OpenH2O</span>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">

        <!-- PRIMARY -->
        <a href="{% url 'accounting:dashboard' %}"
           class="sidebar-link{% if '/accounting/dashboard' in request.path %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"/>
                <rect x="14" y="3" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/>
            </svg>
            <span class="sidebar-link-text">Dashboard</span>
        </a>
        <a href="{% url 'geography:map' %}"
           class="sidebar-link{% if '/map/' in request.path %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
                <line x1="8" y1="2" x2="8" y2="18"/>
                <line x1="16" y1="6" x2="16" y2="22"/>
            </svg>
            <span class="sidebar-link-text">Map</span>
        </a>

        <!-- DATA -->
        <div class="sidebar-section">
            <span class="sidebar-link-text sidebar-section-label">Data</span>
        </div>
        <a href="{% url 'accounting:ledger_list' %}"
           class="sidebar-link{% if '/accounting/ledger' in request.path %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <line x1="10" y1="9" x2="8" y2="9"/>
            </svg>
            <span class="sidebar-link-text">Ledger</span>
        </a>
        <a href="{% url 'parcels:list' %}"
           class="sidebar-link{% if '/parcels/' in request.path %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="9" y1="3" x2="9" y2="21"/>
            </svg>
            <span class="sidebar-link-text">Parcels</span>
        </a>
        <a href="{% url 'wells:list' %}"
           class="sidebar-link{% if '/wells/' in request.path %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 2v4"/>
                <path d="M12 18v4"/>
                <path d="M4.93 4.93l2.83 2.83"/>
                <path d="M16.24 16.24l2.83 2.83"/>
                <path d="M2 12h4"/>
                <path d="M18 12h4"/>
            </svg>
            <span class="sidebar-link-text">Wells</span>
        </a>
        <a href="{% url 'surface:water_rights_list' %}"
           class="sidebar-link{% if '/surface/' in request.path %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            <span class="sidebar-link-text">Water Rights</span>
        </a>
        <a href="{% url 'recharge:list' %}"
           class="sidebar-link{% if '/recharge/' in request.path %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
            </svg>
            <span class="sidebar-link-text">Recharge</span>
        </a>
        <a href="{% url 'datasync:station_list' %}"
           class="sidebar-link{% if '/datasync/' in request.path %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M3 12h3"/>
                <path d="M18 12h3"/>
                <path d="M12 3v3"/>
                <path d="M12 18v3"/>
                <path d="M5.64 5.64l2.12 2.12"/>
                <path d="M16.24 16.24l2.12 2.12"/>
                <path d="M5.64 18.36l2.12-2.12"/>
                <path d="M16.24 7.76l2.12-2.12"/>
            </svg>
            <span class="sidebar-link-text">Stations</span>
        </a>

        <!-- REPORTING -->
        <div class="sidebar-section">
            <span class="sidebar-link-text sidebar-section-label">Reporting</span>
        </div>
        <a href="{% url 'reporting:report_list' %}"
           class="sidebar-link{% if '/reporting/' in request.path %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="9" y1="15" x2="15" y2="15"/>
                <line x1="9" y1="11" x2="13" y2="11"/>
            </svg>
            <span class="sidebar-link-text">Reports</span>
        </a>

        <!-- SYSTEM -->
        <div class="sidebar-section">
            <span class="sidebar-link-text sidebar-section-label">System</span>
        </div>
        <a href="{% url 'health:dashboard' %}"
           class="sidebar-link{% if '/health/' in request.path %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
            <span class="sidebar-link-text">Health</span>
        </a>

        <!-- SETUP -->
        <div class="sidebar-section">
            <span class="sidebar-link-text sidebar-section-label">Setup</span>
        </div>
        <a href="{% url 'accounting:accounts_list' %}"
           class="sidebar-link{% if '/accounting/accounts' in request.path %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="M2 10h20"/>
                <path d="M6 16h4"/>
            </svg>
            <span class="sidebar-link-text">Accounts</span>
        </a>
        <a href="{% url 'accounting:periods_list' %}"
           class="sidebar-link{% if '/accounting/reporting-periods' in request.path %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span class="sidebar-link-text">Periods</span>
        </a>
        <a href="{% url 'accounting:allocations_list' %}"
           class="sidebar-link{% if '/accounting/allocations' in request.path %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 2a10 10 0 0 1 0 20"/>
                <path d="M12 2v20"/>
                <path d="M2 12h10"/>
            </svg>
            <span class="sidebar-link-text">Allocations</span>
        </a>
    </nav>
</aside>
