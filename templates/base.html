{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Open Water Accounting Platform{% endblock %}</title>

    <!-- Google Fonts: Public Sans + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Public+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Compiled Tailwind CSS -->
    <link rel="stylesheet" href="{% static 'css/output.css' %}">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <main class="min-h-screen flex items-center justify-center p-md">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
