{% extends "base.html" %}
{% block title %}Email Sent — Open Water{% endblock %}
{% block content %}
<div class="card-raised w-full text-center" style="max-width: 420px;">
    <h1 class="text-xl font-extrabold mb-sm text-gold">Check Your Email</h1>
    <p class="text-sm mb-lg text-secondary">
        If an account exists with that email, we've sent a password reset link. Check your inbox (and spam folder).
    </p>
    <a href="{% url 'account_login' %}" class="btn-secondary">Back to Login</a>
</div>
{% endblock %}
