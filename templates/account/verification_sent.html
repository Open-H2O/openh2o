{% extends "base_auth.html" %}
{% block title %}Verification Sent — Open Water{% endblock %}
{% block content %}
<div class="card-raised w-full text-center" style="max-width: 420px;">
    <h1 class="text-xl font-extrabold mb-sm text-gold">Verify Your Email</h1>
    <p class="text-sm mb-lg text-secondary">
        We've sent a verification email. Check your inbox and click the link to activate your account.
    </p>
    <a href="{% url 'account_login' %}" class="btn-secondary">Back to Login</a>
</div>
{% endblock %}
