services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openh2o}
      POSTGRES_USER: ${POSTGRES_USER:-openh2o}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openh2o}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openh2o}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.production}
      DATABASE_URL: postgis://${POSTGRES_USER:-openh2o}:${POSTGRES_PASSWORD:-openh2o}@db:5432/${POSTGRES_DB:-openh2o}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
      # Earth Engine service-account key dir (OPENET_MODE=gee only). Read-only.
      # Mount the directory, not the file: a single-file bind to a path that
      # does not exist yet would make Docker create a stray directory and break
      # the default api-mode deploy. The key (./secrets/gee-key.json) is
      # gitignored and must never be committed; api mode never reads it.
      # See docs/earth-engine-tier-setup.md.
      - ./secrets:/run/secrets:ro

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - static_files:/srv/static:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  db_data:
  static_files:
  caddy_data:
  caddy_config:
